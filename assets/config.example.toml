# Exemplo de config do Oride
# Copie para:
#   ~/.config/oride/config.toml     (usuário)
#   .oride/config.toml              (projeto; sobrescreve usuário)

theme = "default"
show_line_numbers = true

[editor]
tab_size = 4
insert_spaces = true

# Cores: nomes (white, darkgray, reset, …) ou #RRGGBB
[ui]
background = "reset"
foreground = "reset"
line_number = "darkgray"
status_bg = "darkgray"
status_fg = "white"
status_dirty = "yellow"
cursor_bg = "white"
cursor_fg = "black"
gutter_width = 5

# Chord → action (defaults embutidos; só sobrescreva o que quiser)
[keys]
"ctrl+s" = "save"
"ctrl+shift+s" = "save_as"
"ctrl+alt+s" = "save_all"
"ctrl+q" = "quit"
"ctrl+f" = "find"
"f3" = "find_next"
"ctrl+shift+h" = "replace"
"ctrl+h" = "help"
"ctrl+\"" = "toggle_terminal"
"ctrl+c" = "copy"
"ctrl+v" = "paste"
"ctrl+x" = "cut"
"esc" = "quit"
"ctrl+z" = "undo"
"ctrl+y" = "redo"
"ctrl+b" = "focus_tree"
"ctrl+e" = "focus_editor"
"ctrl+shift+b" = "toggle_tree"
"ctrl+o" = "open_folder"
"alt+z" = "toggle_soft_wrap"
"ctrl+/" = "toggle_comment"
"ctrl+`" = "toggle_terminal"
"ctrl+p" = "open_file_fuzzy"
"ctrl+shift+p" = "command_palette"
"ctrl+n" = "new_tab"
"ctrl+w" = "close_tab"

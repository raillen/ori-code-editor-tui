# Exemplo de config do Oride
# Copie para:
#   ~/.config/oride/config.toml     (usuário)
#   .oride/config.toml              (projeto; sobrescreve usuário)

theme = "default"
show_line_numbers = true

[editor]
tab_size = 4
insert_spaces = true

# Cores: nomes (white, darkgray, reset, …) ou #RRGGBB
[ui]
background = "reset"
foreground = "reset"
line_number = "darkgray"
status_bg = "darkgray"
status_fg = "white"
status_dirty = "yellow"
cursor_bg = "white"
cursor_fg = "black"
gutter_width = 5

# Chord → action (defaults embutidos; só sobrescreva o que quiser)
[keys]
"ctrl+s" = "save"
"ctrl+shift+s" = "save_as"
"ctrl+alt+s" = "save_all"
"ctrl+q" = "quit"
"ctrl+a" = "select_all"
"ctrl+f" = "find"
"ctrl+shift+f" = "project_find"
"ctrl+shift+v" = "toggle_md_preview"
"alt+p" = "toggle_md_preview"
"f3" = "find_next"
"ctrl+h" = "replace"
"ctrl+shift+h" = "replace"
"f1" = "help"
"ctrl+g" = "help"
"ctrl+shift+/" = "help"
"ctrl+?" = "help"
"ctrl+\"" = "toggle_terminal"
"ctrl+c" = "copy"
"ctrl+v" = "paste"
"ctrl+x" = "cut"
"shift+left" = "move_left_extend"
"shift+right" = "move_right_extend"
"shift+up" = "move_up_extend"
"shift+down" = "move_down_extend"
"shift+home" = "move_line_start_extend"
"shift+end" = "move_line_end_extend"
"ctrl+home" = "move_doc_start"
"ctrl+end" = "move_doc_end"
"ctrl+shift+home" = "move_doc_start_extend"
"ctrl+shift+end" = "move_doc_end_extend"
"esc" = "quit"
"ctrl+z" = "undo"
"ctrl+y" = "redo"
"ctrl+b" = "focus_tree"
"ctrl+e" = "focus_editor"
"ctrl+shift+b" = "toggle_tree"
"ctrl+o" = "open_folder"
"alt+z" = "toggle_soft_wrap"
"ctrl+/" = "toggle_comment"
"ctrl+`" = "toggle_terminal"
"ctrl+p" = "open_file_fuzzy"
"ctrl+shift+p" = "command_palette"
"ctrl+n" = "new_tab"
"ctrl+w" = "close_tab"
"ctrl+pageup" = "prev_tab"
"ctrl+pagedown" = "next_tab"
"alt+left" = "prev_tab"
"alt+right" = "next_tab"

[editor]
tab_size = 4
insert_spaces = true
format_on_save = false
use_editorconfig = true

[tree]
width = 28
show_hidden = false
git_status = true

[terminal]
# shell = "/bin/zsh"
default_height = 10

[lsp]
enabled = true
oriscript_command = ["oriscript", "lsp"]
timeout_ms = 10000

[syntax]
keyword = "magenta"
string = "green"
comment = "darkgray"
